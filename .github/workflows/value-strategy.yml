name: Value Strategy Daily Run

on:
  schedule:
    # 평일 00:00 UTC = 09:00 KST
    - cron: '0 0 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Trading mode'
        required: true
        default: 'mock'
        type: choice
        options:
          - mock
          - real
      dry_run:
        description: 'Dry-run (print ranking / no orders)'
        required: true
        default: true
        type: boolean

concurrency:
  group: value-strategy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run-value:
    # SAFETY GATE: block real+dry_run=false from workflow_dispatch
    if: >
      !(github.event_name == 'workflow_dispatch'
        && inputs.mode == 'real'
        && inputs.dry_run != 'true')
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    env:
      KIWOOM_MODE: ${{ inputs.mode || 'mock' }}
      VALUE_HOLDINGS: ${{ vars.VALUE_HOLDINGS || '10' }}
      VALUE_MAX_BUDGET: ${{ vars.VALUE_MAX_BUDGET || '0' }}
      VALUE_MIN_MARKET_CAP: ${{ vars.VALUE_MIN_MARKET_CAP || '0' }}
      VALUE_MARKET_FILTER: ${{ vars.VALUE_MARKET_FILTER || 'true' }}
      VALUE_MARKET_FILTER_ONLY_KOSPI: ${{ vars.VALUE_MARKET_FILTER_ONLY_KOSPI || 'false' }}
      VALUE_KEEP_HOLDINGS: ${{ vars.VALUE_KEEP_HOLDINGS || 'false' }}

      KIWOOM_REAL_APPKEY: ${{ secrets.KIWOOM_REAL_APPKEY }}
      KIWOOM_REAL_SECRETKEY: ${{ secrets.KIWOOM_REAL_SECRETKEY }}
      KIWOOM_MOCK_APPKEY: ${{ secrets.KIWOOM_MOCK_APPKEY || secrets.KIWOOM_REAL_APPKEY }}
      KIWOOM_MOCK_SECRETKEY: ${{ secrets.KIWOOM_MOCK_SECRETKEY || secrets.KIWOOM_REAL_SECRETKEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install --no-interaction

      - name: Run value strategy
        run: |
          DRY_RUN_FLAG=""
          if [[ "${{ inputs.dry_run != 'false' || github.event_name == 'schedule' }}" == "true" ]]; then
            DRY_RUN_FLAG="--dry-run"
          fi
          poetry run python scripts/run_value_strategy.py $DRY_RUN_FLAG

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: value-strategy-logs-${{ github.run_id }}
          path: logs/
          retention-days: 7
